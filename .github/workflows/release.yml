name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Package verification
        run: cargo package -p rust-contract-checks
      - name: Publish dry-run
        run: cargo publish -p rust-contract-checks --dry-run
      - name: Build Python distributions
        run: |
          mkdir -p dist
          maturin sdist --manifest-path bindings/python-contracts-rs/Cargo.toml --out dist
          maturin build --release --manifest-path bindings/python-contracts-rs/Cargo.toml --out dist
      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN が未設定のため crates.io publish をスキップします"
            exit 0
          fi

          cargo publish -p rust-contract-checks --token "$CARGO_REGISTRY_TOKEN"

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - package
      - publish-pypi
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
