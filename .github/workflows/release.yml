name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package-python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: python-wheel-linux
          - os: macos-14
            artifact_name: python-wheel-macos
          - os: windows-latest
            artifact_name: python-wheel-windows
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal2 target
        if: matrix.os == 'macos-14'
        run: rustup target add x86_64-apple-darwin
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build Python distributions
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "macos-14" ]; then
            maturin build --release --target universal2-apple-darwin --manifest-path bindings/python-contracts-rs/Cargo.toml --out dist
          else
            maturin build --release --manifest-path bindings/python-contracts-rs/Cargo.toml --out dist
          fi
      - name: Upload Python wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl
  publish-crates:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN が未設定のため crates.io publish をスキップします"
            exit 0
          fi

          echo "crates.io publish は別途 macros crate の公開順序を整理してから有効化してください"

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-python
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build Python sdist
        run: |
          mkdir -p dist
          maturin sdist --manifest-path bindings/python-contracts-rs/Cargo.toml --out dist
      - name: Download Linux wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-wheel-linux
          path: dist
      - name: Download macOS wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-wheel-macos
          path: dist
      - name: Download Windows wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-wheel-windows
          path: dist
      - name: Inspect Python distributions
        run: ls -la dist
      - name: Publish distributions to PyPI with token
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          verbose: true
          attestations: false
          skip-existing: true
      - name: Publish distributions to PyPI with Trusted Publishing
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
          attestations: false
          skip-existing: true

  github-release:
    if: >-
      ${{
        always()
        && startsWith(github.ref, 'refs/tags/v')
        && needs.package-python.result == 'success'
        && needs.publish-pypi.result == 'success'
      }}
    needs:
      - package-python
      - publish-pypi
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build Python sdist
        run: |
          mkdir -p dist
          maturin sdist --manifest-path bindings/python-contracts-rs/Cargo.toml --out dist
      - name: Download Linux wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-wheel-linux
          path: dist
      - name: Download macOS wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-wheel-macos
          path: dist
      - name: Download Windows wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-wheel-windows
          path: dist
      - name: Generate GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: dist/*
