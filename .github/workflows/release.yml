name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package-python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: python-wheel-linux
          - os: macos-13
            artifact_name: python-wheel-macos-intel
          - os: macos-14
            artifact_name: python-wheel-macos-apple-silicon
          - os: windows-latest
            artifact_name: python-wheel-windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build Python distributions
        shell: bash
        run: |
          mkdir -p dist
          maturin build --release --manifest-path bindings/python-contracts-rs/Cargo.toml --out dist
      - name: Upload Python wheel
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl
  package-python-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build Python sdist
        run: |
          mkdir -p dist
          maturin sdist --manifest-path bindings/python-contracts-rs/Cargo.toml --out dist
      - name: Upload Python sdist
        uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: dist/*.tar.gz

  publish-crates:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - package-python
      - package-python-sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN が未設定のため crates.io publish をスキップします"
            exit 0
          fi

          echo "crates.io publish は別途 macros crate の公開順序を整理してから有効化してください"

  publish-pypi-wheel:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-python
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Download Linux wheel
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-linux
          path: dist
      - name: Download macOS Intel wheel
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-macos-intel
          path: dist
      - name: Download macOS Apple Silicon wheel
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-macos-apple-silicon
          path: dist
      - name: Download Windows wheel
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-windows
          path: dist
      - name: Inspect Python wheel
        run: ls -la dist
      - name: Publish to PyPI with token
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          verbose: true
          attestations: false
          skip-existing: true
      - name: Publish to PyPI with Trusted Publishing
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
          attestations: false
          skip-existing: true

  publish-pypi-sdist:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-python-sdist
    runs-on: ubuntu-latest
    continue-on-error: true
    environment: pypi
    permissions:
      id-token: write
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Download Python sdist
        uses: actions/download-artifact@v8
        with:
          name: python-sdist
          path: dist
      - name: Inspect Python sdist
        run: ls -la dist
      - name: Publish sdist to PyPI with token
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          verbose: true
          attestations: false
          skip-existing: true
      - name: Publish sdist to PyPI with Trusted Publishing
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
          attestations: false
          skip-existing: true

  github-release:
    if: >-
      ${{
        always()
        && startsWith(github.ref, 'refs/tags/v')
        && needs.package-python.result == 'success'
        && needs.package-python-sdist.result == 'success'
        && needs.publish-pypi-wheel.result == 'success'
      }}
    needs:
      - package-python
      - package-python-sdist
      - publish-pypi-wheel
      - publish-pypi-sdist
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux wheel
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-linux
          path: dist
      - name: Download macOS Intel wheel
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-macos-intel
          path: dist
      - name: Download macOS Apple Silicon wheel
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-macos-apple-silicon
          path: dist
      - name: Download Windows wheel
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-windows
          path: dist
      - name: Download Python sdist
        uses: actions/download-artifact@v8
        with:
          name: python-sdist
          path: dist
      - name: Generate GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
